[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; Use a moderate static pool — Render's free/starter instances have limited
; RAM, so we avoid spawning too many children. Tune pm.max_children based on
; (Available RAM - RAM used by Nginx/OS) / Average PHP process size (~30-60MB).
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Send PHP-FPM logs to stdout/stderr so Render's log viewer picks them up
catch_workers_output = yes
decorate_workers_output = no

php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
